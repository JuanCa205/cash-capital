<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Fondo gradiente oscuro -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Patrón decorativo de fondo (círculos sutiles) -->
  <g opacity="0.05">
    <circle cx="100" cy="100" r="200" fill="#c4b5fd"/>
    <circle cx="1100" cy="500" r="250" fill="#c4b5fd"/>
    <circle cx="600" cy="300" r="300" fill="#c4b5fd"/>
    <circle cx="200" cy="500" r="150" fill="#c4b5fd"/>
    <circle cx="1000" cy="100" r="180" fill="#c4b5fd"/>
  </g>

  <!-- Piggy bank icon grande -->
  <g transform="translate(140, 160) scale(3.5)">
    <ellipse cx="30" cy="38" rx="18" ry="14" fill="url(#iconGrad)"/>
    <circle cx="30" cy="26" r="12" fill="url(#iconGrad)"/>
    <polygon points="22,18 20,10 25,15" fill="url(#iconGrad)"/>
    <polygon points="38,18 40,10 35,15" fill="url(#iconGrad)"/>
    <ellipse cx="30" cy="29" rx="5" ry="3" fill="#8B5CF6"/>
    <circle cx="26" cy="24" r="2.5" fill="#1E1B4B"/>
    <circle cx="34" cy="24" r="2.5" fill="#1E1B4B"/>
    <circle cx="30" cy="40" r="3.5" fill="#FBBF24"/>
    <text x="30" y="42.5" text-anchor="middle" font-size="4.5" font-weight="bold" fill="#92400E" font-family="Arial">$</text>
    <path d="M45,34 C50,32 50,38 47,40" fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Título principal -->
  <text x="560" y="270" font-family="'Fredoka', 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="700" fill="url(#textGrad)">
    Cash Capital
  </text>

  <!-- Subtítulo -->
  <text x="560" y="340" font-family="'Nunito', 'Segoe UI', Arial, sans-serif" font-size="32" fill="#94a3b8">
    Aprende finanzas jugando
  </text>

  <!-- Features -->
  <g transform="translate(170, 420)">
    <circle cx="0" cy="0" r="6" fill="#A78BFA"/>
    <text x="20" y="6" font-family="'Nunito', Arial, sans-serif" font-size="24" fill="#c4b5fd">Lecciones Interactivas</text>
    <circle cx="320" cy="0" r="6" fill="#A78BFA"/>
    <text x="340" y="6" font-family="'Nunito', Arial, sans-serif" font-size="24" fill="#c4b5fd">Desafíos y Logros</text>
    <circle cx="640" cy="0" r="6" fill="#A78BFA"/>
    <text x="660" y="6" font-family="'Nunito', Arial, sans-serif" font-size="24" fill="#c4b5fd">Gamificación Total</text>
  </g>

  <!-- Línea decorativa inferior -->
  <line x1="200" y1="560" x2="1000" y2="560" stroke="#4c1d95" stroke-width="2" opacity="0.5"/>
</svg>
